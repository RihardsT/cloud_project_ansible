# sudo zypper ref
# sudo zypper in vlc vlc-codecs
# sudo zypper dup --from vlc --allow-vendor-change

- name: Remove packages
  become: yes
  community.general.zypper:
    name: "{{ item }}"
    state: absent
  loop:
    - hexchat
    - rhythmbox
- name: Install packages
  become: yes
  community.general.zypper:
    name: "{{ item }}"
  loop:
    - vim
    - git
    - fish
    - code
    - chromium
    - audacious
    - sysstat
    - gimp
    - jq
    - keepassxc
    - cronie
    - gparted
    - blueman
    - digikam
    - helm
    - btop # instead of psensor, though I should search more
    - audacity
    - vlc
